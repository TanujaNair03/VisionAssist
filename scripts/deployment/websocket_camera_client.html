<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vision Assistance - Live & Video Test</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f0f2f5;
            color: #333;
        }

        .container {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #eee;
            padding-bottom: 20px;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            justify-content: center;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
        }

        input[type="text"] {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            width: 250px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #007bff;
            color: white;
        }

        .btn-primary:hover {
            background: #0056b3;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .video-area {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }

        .viewport {
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            min-height: 480px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .viewport img {
            width: 100%;
            height: auto;
            object-fit: contain;
        }

        /* Hidden video element for processing */
        #sourceVideo {
            display: none;
        }

        .stats-panel {
            background: #fff;
            border: 1px solid #e1e4e8;
            border-radius: 8px;
            padding: 20px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }

        .log-box {
            height: 250px;
            overflow-y: auto;
            background: #1e1e1e;
            color: #00ff00;
            font-family: monospace;
            padding: 10px;
            border-radius: 6px;
            margin-top: 20px;
            font-size: 12px;
        }

        .status-badge {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: bold;
        }

        .connected {
            background: #d4edda;
            color: #155724;
        }

        .disconnected {
            background: #f8d7da;
            color: #721c24;
        }

        /* File input styling */
        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }

        .file-input-wrapper input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>👁️ Vision Assistance System</h1>
            <p>Real-time Detection via Webcam or Video File</p>
        </div>

        <div class="controls">
            <input type="text" id="serverUrl" placeholder="Server Address (e.g., localhost:8000)">
            <button onclick="connectWebSocket()" class="btn-primary" id="connectBtn">🔌 Connect</button>
            <button onclick="disconnectWebSocket()" class="btn-danger" id="disconnectBtn" disabled>❌ Disconnect</button>

            <div style="border-left: 2px solid #ddd; margin: 0 10px;"></div>

            <button onclick="startCamera()" class="btn-success" id="camBtn" disabled>📹 Start Camera</button>

            <div class="file-input-wrapper">
                <button class="btn-secondary" id="fileBtn" disabled>📂 Upload Video File</button>
                <input type="file" id="videoUpload" accept="video/*" onchange="handleVideoUpload(this)">
            </div>

            <button onclick="stopSource()" class="btn-danger" id="stopBtn" disabled>⏹️ Stop</button>
            <button onclick="toggleMute()" class="btn-primary" id="muteBtn">🔊 Sound On</button>
        </div>

        <div style="text-align: center; margin-bottom: 15px;">
            <span id="statusBadge" class="status-badge disconnected">Disconnected</span>
            <span style="margin-left: 15px;">FPS: <strong id="fpsCounter">0</strong></span>
        </div>

        <div class="video-area">
            <div class="viewport" id="displayContainer">
                <div style="color: #666;">Waiting for source...</div>
            </div>

            <div class="stats-panel">
                <h3>Live Statistics</h3>
                <div class="stat-row"><span>Frame:</span> <strong id="frameCount">0</strong></div>
                <div class="stat-row"><span>Detections:</span> <strong id="detCount">0</strong></div>
                <div class="stat-row"><span>Audio Alerts:</span> <strong id="audioCount">0</strong></div>

                <div class="log-box" id="log"></div>
            </div>
        </div>

        <video id="sourceVideo" playsinline muted width="640" height="480"></video>
    </div>

    <script>
        let ws = null;
        let processingInterval = null;
        let isMuted = false;
        let frameCount = 0;
        let lastTime = Date.now();
        let framesThisSecond = 0;

        // DOM Elements
        const videoSource = document.getElementById('sourceVideo');
        const display = document.getElementById('displayContainer');
        const logBox = document.getElementById('log');
        const serverInput = document.getElementById('serverUrl');

        // Initialize default URL
        serverInput.value = window.location.hostname ? `${window.location.hostname}:8000` : 'localhost:8000';

        function log(msg) {
            const div = document.createElement('div');
            div.innerText = `> ${msg}`;
            logBox.appendChild(div);
            logBox.scrollTop = logBox.scrollHeight;
        }

        function updateStatus(isConnected) {
            const badge = document.getElementById('statusBadge');
            badge.className = `status-badge ${isConnected ? 'connected' : 'disconnected'}`;
            badge.innerText = isConnected ? 'Connected' : 'Disconnected';

            document.getElementById('connectBtn').disabled = isConnected;
            document.getElementById('disconnectBtn').disabled = !isConnected;
            document.getElementById('camBtn').disabled = !isConnected;
            document.getElementById('fileBtn').disabled = !isConnected;
            document.getElementById('stopBtn').disabled = true; // Only enabled when source runs
        }

        function connectWebSocket() {
            const url = serverInput.value;
            // Auto-detect secure context
            const protocol = window.location.protocol === 'https:' ? 'wss://' : 'ws://';
            const wsUrl = `${protocol}${url}/ws/camera/stream`;

            log(`Connecting to ${wsUrl}...`);
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                log("WebSocket Connected!");
                updateStatus(true);
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === 'processing_result') {
                    handleResult(data);
                }
            };

            ws.onclose = () => {
                log("Disconnected.");
                stopSource();
                updateStatus(false);
            };

            ws.onerror = (e) => log(`Error: ${e.message || 'Connection failed'}`);
        }

        function disconnectWebSocket() {
            if (ws) ws.close();
        }

        // ==========================================
        // SOURCE HANDLING (CAMERA OR VIDEO FILE)
        // ==========================================

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { width: 640, height: 480 }
                });
                videoSource.srcObject = stream;
                videoSource.play();
                startProcessing("Camera");
            } catch (e) {
                log(`Camera Error: ${e.message}`);
            }
        }

        function handleVideoUpload(input) {
            const file = input.files[0];
            if (!file) return;

            const fileUrl = URL.createObjectURL(file);
            videoSource.srcObject = null; // Clear camera stream if any
            videoSource.src = fileUrl;
            videoSource.loop = true; // Loop video for testing
            videoSource.play();

            log(`Loaded video: ${file.name}`);
            startProcessing("Video File");
        }

        function startProcessing(sourceType) {
            document.getElementById('camBtn').disabled = true;
            document.getElementById('fileBtn').disabled = true;
            document.getElementById('stopBtn').disabled = false;

            log(`Started processing: ${sourceType}`);

            // OPTIMIZED: Send every 80ms (~12fps)
            // This matches the server optimization
            processingInterval = setInterval(captureAndSend, 80);
        }

        function stopSource() {
            if (processingInterval) clearInterval(processingInterval);

            // Stop video element
            videoSource.pause();
            if (videoSource.srcObject) {
                videoSource.srcObject.getTracks().forEach(track => track.stop());
                videoSource.srcObject = null;
            }
            videoSource.src = "";

            document.getElementById('camBtn').disabled = !ws || ws.readyState !== WebSocket.OPEN;
            document.getElementById('fileBtn').disabled = !ws || ws.readyState !== WebSocket.OPEN;
            document.getElementById('stopBtn').disabled = true;
            log("Source stopped.");
        }

        // ==========================================
        // FRAME CAPTURE & SENDING
        // ==========================================

        function captureAndSend() {
            if (ws.readyState !== WebSocket.OPEN) return;

            // 1. Create off-screen canvas
            const canvas = document.createElement('canvas');

            // OPTIMIZATION: Force 640x480. 
            // If you upload a 4K video, this downscales it BEFORE sending,
            // saving massive bandwidth and server CPU.
            canvas.width = 640;
            canvas.height = 480;

            const ctx = canvas.getContext('2d');
            ctx.drawImage(videoSource, 0, 0, 640, 480);

            // OPTIMIZATION: Low quality JPEG for speed
            const frameData = canvas.toDataURL('image/jpeg', 0.5).split(',')[1];

            ws.send(JSON.stringify({
                command: 'process_frame',
                frame_data: frameData
            }));
        }

        // ==========================================
        // RESULT HANDLING
        // ==========================================

        function handleResult(data) {
            // Update FPS
            framesThisSecond++;
            if (Date.now() - lastTime >= 1000) {
                document.getElementById('fpsCounter').innerText = framesThisSecond;
                framesThisSecond = 0;
                lastTime = Date.now();
            }

            // Update Stats
            if (data.frame_count) document.getElementById('frameCount').innerText = data.frame_count;
            if (data.detections_count !== undefined) document.getElementById('detCount').innerText = data.detections_count;

            // Render Image
            if (data.annotated_frame) {
                const img = new Image();
                img.src = `data:image/jpeg;base64,${data.annotated_frame}`;
                img.style.width = '100%';
                display.innerHTML = '';
                display.appendChild(img);
            }

            // Play Audio
            if (!isMuted && data.audio_data && data.audio_data.length > 0) {
                document.getElementById('audioCount').innerText =
                    parseInt(document.getElementById('audioCount').innerText) + data.audio_data.length;

                data.audio_data.forEach(b64 => playAudio(b64));
            }
        }

        function playAudio(b64) {
            try {
                const snd = new Audio(`data:audio/mp3;base64,${b64}`);
                snd.play();
            } catch (e) { console.error("Audio Error", e); }
        }

        function toggleMute() {
            isMuted = !isMuted;
            const btn = document.getElementById('muteBtn');
            btn.innerText = isMuted ? "🔇 Sound Off" : "🔊 Sound On";
            // Mute the source video so we only hear TTS alerts
            videoSource.muted = true;
        }
    </script>
</body>

</html>
